name: デイリーレポート送信

on:
  workflow_dispatch:
    # 手動実行のみ（スケジュール実行はCoworkタスクに移行済み）
    # schedule は無効化: Coworkの bot-daily-report タスクが毎日23:00 JSTに実行

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: デイリーレポートを送信
        run: python scripts/daily_report.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
