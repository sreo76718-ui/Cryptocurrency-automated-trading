# ============================================================
# config.yml  —  全設定の一元管理
# APIキーは .env に書く。ここには書かない
# ============================================================

# --- 実行モード ---
mode:
  run: "live"             # "dry_run" | "live"

# --- アクティブな市場 ---
active_exchange: "bitbank"

# --- ループ設定 ---
loop:
  interval_sec: 30
  max_consecutive_errors: 5

# --- 取引対象 ---
# ETH は最低発注額が約¥7,280のため小資金では無効
targets:
  - symbol: "btc_jpy"
    enabled: true
    risk_overrides:
      max_order_ratio: 0.75   # ¥20,000残高で¥15,000注文 → TP+0.8%で+¥120

  - symbol: "eth_jpy"
    enabled: true
    risk_overrides:
      max_order_ratio: 0.75   # ¥20,000残高で¥15,000注文 → TP+0.8%で+¥120

  - symbol: "sol_jpy"
    enabled: true
    risk_overrides:
      max_order_ratio: 0.50   # ¥20,000残高で¥10,000注文 → TP+1.2%で+¥120
    strategy_overrides:
      fast_period: 5
      slow_period: 13
      rsi_period: 14
      rsi_buy_min: 50
      rsi_sell_max: 50
    exit_overrides:
      take_profit_ratio: 0.012  # TP +1.2%
      stop_loss_ratio: 0.006    # SL -0.6%

# --- 戦略設定（デフォルト: BTC向け） ---
strategy:
  name: "trend_follow"
  trend:
    fast_period: 3
    slow_period: 8
  volatility:
    atr_period: 14
    min_atr_ratio: 0.0002
    min_atr_ratio_weekend: 0.000049

# --- 利確・損切り（デフォルト: BTC向け） ---
exit:
  take_profit_ratio: 0.008  # TP +0.8%
  stop_loss_ratio: 0.004    # SL -0.4%

# --- 資金管理（小資金向け調整）---
risk:
  max_order_ratio: 0.10   # 残高の10%（¥20,000なら¥2,000/注文）
  min_order_jpy: 1000     # 最低発注額

# --- 損失制御（本番設定）---
guard:
  max_daily_loss_jpy: 2000    # 1日の最大損失 ¥2,000（残高の約10%）
  max_consecutive_loss: 3     # 連続損失3回で当日停止
  same_direction_limit: 2     # 同方向2回まで

# --- bitbank固有設定 ---
bitbank:
  order_type_default: "limit"
  taker_allowed_on_surge: false
  spread_threshold_ratio: 0.003
  fill_check_interval_sec: 3
  fill_timeout_sec: 90

# --- OANDA（無効）---
oanda_tokyo:
  enabled: false
oanda_ny:
  enabled: false

# --- Discord通知 ---
notifier:
  discord:
    enabled: true
    notify_on:
      - entry
      - exit
      - error
      - stop
      - daily_summary
